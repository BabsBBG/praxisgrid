name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --legacy-peer-deps
      - run: npm run lint
      - run: npm test
      - run: node scripts/validate-harness.mjs
      - run: node scripts/validate-question-bank.mjs
      - run: npm run validate:source-grounding
      - run: npm run validate:duplicates
      - run: node scripts/check-routes.mjs
      - run: npm run build
