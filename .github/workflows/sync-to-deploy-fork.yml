name: Sync to deploy fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Nehemiah's deploy fork
        env:
          PAT: ${{ secrets.DEPLOY_FORK_PAT }}
        run: |
          git remote add fork https://github.com/nehyabah/azure-quest-pwa.git
          git -c http.extraheader="Authorization: Basic $(echo -n "nehyabah:$PAT" | base64 -w 0)" push fork HEAD:main --force
